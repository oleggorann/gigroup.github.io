<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gi Group</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00c896;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --header-h: 56px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    z-index: 100;
  }

  .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 15px; color: var(--accent); }

  .search-wrap { flex: 1; position: relative; }
  #search {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 7px 10px 7px 30px; outline: none;
  }

  .header-counts { display: flex; flex-direction: column; align-items: flex-end; font-size: 10px; line-height: 1.2; }
  .hc-item { color: var(--text-muted); white-space: nowrap; }
  
  .btn-save {
    background: var(--accent); color: #000; border: none; border-radius: 6px;
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 600;
    padding: 8px 12px; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:active { opacity: 0.7; }

  main { padding-top: calc(var(--header-h) + 10px); padding-bottom: 40px; }

  .section-label {
    font-family: 'Unbounded', sans-serif; font-size: 9px; text-transform: uppercase;
    color: var(--text-muted); padding: 15px 12px 5px; border-bottom: 1px solid var(--border);
    letter-spacing: 1px;
  }

  .person {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    transition: background 0.3s;
  }
  .person.item-17 { background: #1a1408; }
  .person.item-19 { background: #120e1a; }

  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; background: #222; border: 1px solid var(--border); }
  .flag-below { position: absolute; bottom: -2px; right: -2px; font-size: 12px; background: var(--surface); border-radius: 3px; padding: 1px; }

  .info { flex: 1; min-width: 0; }
  .name-en { font-weight: 600; font-size: 14px; color: var(--text); cursor: pointer; }
  .name-ua { font-size: 11px; color: var(--text-dim); }
  .viber-name { font-size: 10px; color: var(--text-muted); }
  .phone { color: var(--accent); font-size: 12px; margin-top: 3px; font-weight: 600; }

  .controls { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .check-btn {
    width: 36px; height: 26px; border-radius: 4px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 8px; 
    cursor: pointer; position: relative; background: var(--surface2);
    transition: all 0.2s;
  }
  .check-btn svg { width: 12px; height: 12px; stroke: #000; stroke-width: 3; fill: none; display: none; }
  
  .check-btn.checked-17 { background: #f59e0b; border-color: #f59e0b; }
  .check-btn.checked-19 { background: #8b5cf6; border-color: #8b5cf6; }
  .check-btn.checked-17 svg, .check-btn.checked-19 svg { display: block; }
  
  .btn-label { position: absolute; bottom: -10px; font-size: 7px; color: var(--text-muted); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px;
    transition: transform 0.3s; z-index: 1000; font-weight: 600;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 100%; max-height: 80vh; border-radius: 8px; }
</style>

  </div>

let set17 = [];
let set19 = [];

function loadData() {
  db.ref('attendance').on('value', (snapshot) => {
    const data = snapshot.val() || {};
    set17 = data.set17 || [];
    set19 = data.set19 || [];
    render(document.getElementById('search').value);
  });
}

function saveData() {
  db.ref('attendance').set({
    set17: set17,
    set19: set19
  }).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

function toggle(name, type) {
  if (type === '17') {
    if (set17.includes(name)) {
      set17 = set17.filter(n => n !== name);
    } else {
      set17.push(name);
      set19 = set19.filter(n => n !== name);
    }
  } else {
    if (set19.includes(name)) {
      set19 = set19.filter(n => n !== name);
    } else {
      set19.push(name);
      set17 = set17.filter(n => n !== name);
    }
  }
  render(document.getElementById('search').value);
}

function createCard(p) {
  const is17 = set17.includes(p.en);
  const is19 = set19.includes(p.en);
  
  const div = document.createElement('div');
  div.className = 'person' + (is17 ? ' item-17' : is19 ? ' item-19' : '');
  
  div.innerHTML = `
    <div class="avatar-wrap">
      <img class="avatar" src="${p.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${p.en}&background=222&color=00c896'" onclick="openLightbox('${p.photo}')">
      <div class="flag-below">${p.flag}</div>
    </div>
    <div class="info">
      <div class="name-en" onclick="copyToClipboard('${p.en}')">${p.en}</div>
      <div class="name-ua">${p.ua}</div>
      <div class="viber-name">Viber: ${p.viber}</div>
      <div class="phone">${p.phone}</div>
    </div>
    <div class="controls">
      <div class="check-btn ${is17 ? 'checked-17' : ''}" onclick="toggle('${p.en}', '17')">
        <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
        <span class="btn-label">17:00</span>
      </div>
      <div class="check-btn ${is19 ? 'checked-19' : ''}" onclick="toggle('${p.en}', '19')">
        <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
        <span class="btn-label">19:00</span>
      </div>
    </div>
  `;
  return div;
}

function render(query = '') {
  const q = query.toLowerCase().trim();
  const listMain = document.getElementById('list-main');
  const list17 = document.getElementById('list-17');
  const list19 = document.getElementById('list-19');

  listMain.innerHTML = ''; list17.innerHTML = ''; list19.innerHTML = '';

  const filtered = PEOPLE.filter(p => p.en.toLowerCase().includes(q) || p.ua.toLowerCase().includes(q));

  const mainArr = filtered.filter(p => !set17.includes(p.en) && !set19.includes(p.en));
  const arr17 = filtered.filter(p => set17.includes(p.en));
  const arr19 = filtered.filter(p => set19.includes(p.en));

  mainArr.forEach(p => listMain.appendChild(createCard(p)));
  arr17.forEach(p => list17.appendChild(createCard(p)));
  arr19.forEach(p => list19.appendChild(createCard(p)));

  document.getElementById('count-all').textContent = mainArr.length;
  document.getElementById('count-17-top').textContent = set17.length;
  document.getElementById('count-19-top').textContent = set19.length;
  document.getElementById('count-17').textContent = arr17.length;
  document.getElementById('count-19').textContent = arr19.length;

  document.getElementById('section-17').style.display = arr17.length ? 'block' : 'none';
  document.getElementById('section-19').style.display = arr19.length ? 'block' : 'none';
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    const oldText = t.textContent;
    t.textContent = "✓ Скопійовано: " + text;
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); t.textContent = oldText; }, 1500);
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

document.getElementById('search').addEventListener('input', (e) => render(e.target.value));
document.getElementById('save-btn').onclick = saveData;

loadData();
</script>
