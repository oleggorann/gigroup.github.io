<html lang="uk">
<head>
<meta charset="UTF-8">

<style>
  /* Всі ваші оригінальні стилі збережено без змін */
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
    --accent: #00c896; --text: #e8e8e8; --text-dim: #888; --text-muted: #555;
    --header-h: 56px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 12px; z-index: 100; }
  .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 15px; color: var(--accent); }
  .search-wrap { flex: 1; position: relative; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px 7px 30px; outline: none; }
  .header-counts { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.35; font-size: 10px; color: var(--text-muted); }
  .btn-save { background: var(--accent); color: #000; border: none; border-radius: 6px; font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 600; padding: 8px 12px; cursor: pointer; }
  main { padding-top: calc(var(--header-h) + 8px); padding-bottom: 24px; }
  .section-label { font-family: 'Unbounded', sans-serif; font-size: 9px; color: var(--text-muted); padding: 14px 12px 6px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
  .person { display: flex; align-items: center; gap: 11px; padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--surface); position: relative; }
  .avatar { width: 52px; height: 52px; border-radius: 7px; object-fit: cover; background: var(--surface2); border: 1px solid var(--border); }
  .info { flex: 1; min-width: 0; }
  .name-en { font-weight: 600; font-size: 14px; }
  .phone { font-size: 13px; color: var(--accent); font-weight: 600; }
  .check-btn { width: 24px; height: 24px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
  .check-btn.checked-17 { background: #f59e0b; border-color: #f59e0b; }
  .check-btn.checked-19 { background: #8b5cf6; border-color: #8b5cf6; }
  .check-btn svg { width: 12px; height: 12px; stroke: #000; stroke-width: 2.5; fill: none; }
  .btn-label { position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); font-size: 7px; }
  .saved-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--accent); color: #000; padding: 9px 18px; border-radius: 8px; transition: 0.3s; z-index: 200; }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
</style>

<body>

  <span class="logo">Gi Group</span>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Пошук..." autocomplete="off">
  </div>
  <div class="header-counts">
    <span>Список: <span id="count">0</span></span>
    <span style="color:#f59e0b">17:00: <span id="count-17-top">0</span></span>
    <span style="color:#8b5cf6">19:00: <span id="count-19-top">0</span></span>
  </div>
  <button class="btn-save" id="save-btn">Завантаження...</button>
</header>

<main>
  <div id="people-list"></div>
  <div id="section-17" style="display:none">
    <div class="section-label" style="color:#f59e0b">Люди від 17:00 · <span id="count-17">0</span></div>
    <div id="list-17"></div>
  </div>
  <div id="section-19" style="display:none">
    <div class="section-label" style="color:#8b5cf6">Люди від 19:00 · <span id="count-19">0</span></div>
    <div id="list-19"></div>
  </div>
</main>

    { en: "Snarskyi Vasyl", ua: "Снарський Василь", viber: "Васёк", phone: "+420 72 803 7814", photo: "photos/snarskyi_vasyl.jpg", flag: "🇺🇦" },
    { en: "Srebniuk Denys", ua: "Срібнюк Денис", viber: "Денис", phone: "+380 98 026 2269", photo: "photos/srebniuk_denys.jpg", flag: "🇺🇦" },

    { en: "Vraštil Petr", ua: "Враштіл Петр", viber: "Petr Vraštil", phone: "+420 60 340 0085", photo: "photos/vrastil_petr.jpg", flag: "🇨🇿" },
    { en: "Yashnyk Oleksandr", ua: "Яшник Олександр", viber: "Мультыбрендовый", phone: "+380 98 133 9084", photo: "photos/yashnyk_oleksandr.jpg", flag: "🇺🇦" },
    { en: "Zaňková Markéta", ua: "Занькова Маркета", viber: "Name", phone: "+380 00 000 00", photo: "photos/zankova_marketa.jpg", flag: "🇨🇿" },
    { en: "Zarovnenko Oleksandr", ua: "Заровненко Олександр", viber: "Саша Заровненко", phone: "+380 99 449 5383", photo: "photos/zarovnenko_oleksandr.jpg", flag: "🇺🇦" },
    { en: "Zieniewicz Arkadiusz Sebastian", ua: "Зєнєвіч Аркадіуш Себастіан", viber: "Name", phone: "+380 00 000 00", photo: "photos/zieniewicz_arkadiusz.jpg", flag: "🇵🇱" }
  ];

  let set17 = [];
  let set19 = [];

  // ЗАВАНТАЖЕННЯ ДАНИХ (Більш надійний метод)
  onValue(ref(db, 'sync_data'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      set17 = data.set17 || [];
      set19 = data.set19 || [];
    }
    render(document.getElementById('search').value);
    const saveBtn = document.getElementById('save-btn');
    saveBtn.textContent = "Save";
    saveBtn.style.background = "var(--accent)";
  }, (error) => {
    console.error("Firebase Error:", error);
    document.getElementById('save-btn').textContent = "Помилка БД";
    render(); // Рендеримо хоча б локальний список, якщо БД недоступна
  });

  // ФУНКЦІЯ СИНХРОНІЗАЦІЇ
  async function sync() {
    try {
      await set(ref(db, 'sync_data'), { set17, set19 });
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    } catch (e) { alert("Помилка збереження!"); }
  }

  // СТВОРЕННЯ КАРТКИ
  function createCard(person, listType) {
    const div = document.createElement('div');
    div.className = `person ${listType === '17' ? 'item-17' : (listType === '19' ? 'item-19' : '')}`;
    div.innerHTML = `
      <img class="avatar" src="${person.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${person.en}'">
      <div class="info">
        <div class="name-en">${person.en} ${person.flag}</div>
        <div class="name-ua">${person.ua}</div>
        <div class="phone">${person.phone}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:15px;">
        <div class="check-btn ${set17.includes(person.en) ? 'checked-17' : ''}" onclick="window.toggleList('${person.en}', '17')">
          <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
          <span class="btn-label">17:00</span>
        </div>
        <div class="check-btn ${set19.includes(person.en) ? 'checked-19' : ''}" onclick="window.toggleList('${person.en}', '19')">
          <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
          <span class="btn-label">19:00</span>
        </div>
      </div>
    `;
    return div;
  }

  // ПЕРЕМИКАННЯ СПИСКІВ
  window.toggleList = (name, type) => {
    if (type === '17') {
      if (set17.includes(name)) set17 = set17.filter(n => n !== name);
      else { set17.push(name); set19 = set19.filter(n => n !== name); }
    } else {
      if (set19.includes(name)) set19 = set19.filter(n => n !== name);
      else { set19.push(name); set17 = set17.filter(n => n !== name); }
    }
    sync(); // Авто-синхронізація
  };

  // РЕНДЕР
  function render(query = '') {
    const q = query.toLowerCase().trim();
    const mainList = document.getElementById('people-list');
    const list17 = document.getElementById('list-17');
    const list19 = document.getElementById('list-19');

    mainList.innerHTML = ''; list17.innerHTML = ''; list19.innerHTML = '';

    PEOPLE.forEach(p => {
      const isMatch = !q || p.en.toLowerCase().includes(q) || p.ua.toLowerCase().includes(q);
      if (!isMatch) return;

      if (set17.includes(p.en)) {
        list17.appendChild(createCard(p, '17'));
      } else if (set19.includes(p.en)) {
        list19.appendChild(createCard(p, '19'));
      } else {
        mainList.appendChild(createCard(p, 'main'));
      }
    });

    document.getElementById('section-17').style.display = set17.length ? 'block' : 'none';
    document.getElementById('section-19').style.display = set19.length ? 'block' : 'none';
    
    document.getElementById('count').textContent = PEOPLE.length - set17.length - set19.length;
    document.getElementById('count-17-top').textContent = set17.length;
    document.getElementById('count-19-top').textContent = set19.length;
    document.getElementById('count-17').textContent = set17.length;
    document.getElementById('count-19').textContent = set19.length;
  }

  document.getElementById('search').oninput = (e) => render(e.target.value);
  document.getElementById('save-btn').onclick = sync;
</script>
</body>
</html>
