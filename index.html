
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0e0e0e;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
--accent:#00c896;--text:#e8e8e8;--text-dim:#888;--text-muted:#555;
--present-bg:#0a1a15;--present-border:#00c89640;
}
#app{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;min-height:600px;border-radius:10px;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 12px;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:15px;color:var(--accent);white-space:nowrap;flex-shrink:0}
.search-wrap{flex:1;position:relative}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:7px 10px 7px 30px;outline:none;transition:border-color .2s}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:12px}
.header-counts{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;line-height:1.35}
.hc-item{font-family:'JetBrains Mono',monospace;font-size:10px;white-space:nowrap}
.btn-save{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;padding:8px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s}
.btn-save:active{opacity:.7}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition:background .4s}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.sync-dot.synced{background:var(--accent)}
.sync-dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
main{padding-bottom:24px}
.section-label{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);padding:14px 12px 6px;border-bottom:1px solid var(--border)}
.person{display:flex;align-items:center;gap:11px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--surface);transition:background .15s;position:relative}
.person.item-17{background:#1a1200;border-bottom-color:#f59e0b30}
.person.item-19{background:#110d1a;border-bottom-color:#8b5cf630}
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.avatar{width:52px;height:52px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:block}
.avatar-placeholder{width:52px;height:52px;border-radius:7px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600;color:var(--accent)}
.flag-below{font-size:13px;line-height:1;text-align:center}
.info{flex:1;min-width:0;line-height:1.3}
.name-en{font-weight:600;font-size:14px;color:var(--text);word-break:break-word}
.name-ua{font-size:12px;color:var(--text-dim);margin-top:2px;word-break:break-word}
.viber-name{font-size:12px;color:var(--text-muted);margin-top:1px}
.phone{font-size:13px;color:var(--accent);margin-top:2px;font-weight:600;min-height:16px}
.right-col{display:flex;flex-direction:column;align-items:center;gap:20px;flex-shrink:0;padding-bottom:4px}
.check-btn{width:24px;height:24px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;user-select:none;position:relative}
.check-btn:active{opacity:.7}
.check-btn.checked-17{background:#f59e0b;border-color:#f59e0b}
.check-btn.checked-19{background:#8b5cf6;border-color:#8b5cf6}
.check-btn svg{width:12px;height:12px;stroke:#000;stroke-width:2.5;fill:none;opacity:0;transition:opacity .15s}
.check-btn.checked-17 svg,.check-btn.checked-19 svg{opacity:1}
.btn-label{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--text-muted);white-space:nowrap;font-family:'JetBrains Mono',monospace;pointer-events:none}
#no-results{padding:32px 16px;text-align:center;color:var(--text-muted);font-size:12px;display:none}
#section-17,#section-19{display:none}
@keyframes cardOut{0%{opacity:1;transform:translateX(0) scaleY(1);max-height:100px}40%{opacity:.4;transform:translateX(18px) scaleY(1)}100%{opacity:0;transform:translateX(40px) scaleY(0.6);max-height:0;padding-top:0;padding-bottom:0}}
.card-removing{overflow:hidden;animation:cardOut .38s cubic-bezier(.4,0,.6,1) forwards;pointer-events:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--accent);color:#000;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;padding:9px 18px;border-radius:8px;transition:transform .3s ease;z-index:200;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>

const DB_URL="https://gi-group-list-default-rtdb.europe-west1.firebasedatabase.app";
let set17=[],set19=[];
let fbLoaded=false;

function setSyncStatus(s){
  const d=document.getElementById('sync-dot');
  d.className='sync-dot '+s;
}

function getInitials(name){
  const p=name.trim().split(' ');
  return (p[0]?.[0]||'')+(p[1]?.[0]||'');
}

function createCard(person,listType){
  const div=document.createElement('div');
  div.className='person'+(listType==='17'?' item-17':listType==='19'?' item-19':'');

  const avatarWrap=document.createElement('div');
  avatarWrap.className='avatar-wrap';
  const img=document.createElement('img');
  img.className='avatar';
  img.src=person.photo;
  img.alt=person.en;
  img.onerror=function(){
    const ph=document.createElement('div');
    ph.className='avatar-placeholder';
    ph.textContent=getInitials(person.en);
    this.replaceWith(ph);
  };
  const flagEl=document.createElement('div');
  flagEl.className='flag-below';
  flagEl.textContent=person.flag||'';
  avatarWrap.appendChild(img);
  avatarWrap.appendChild(flagEl);

  const info=document.createElement('div');
  info.className='info';
  const nameEn=document.createElement('div');
  nameEn.className='name-en';
  nameEn.textContent=person.en;
  const nameUa=document.createElement('div');
  nameUa.className='name-ua';
  nameUa.textContent=person.ua;
  const viber=document.createElement('div');
  viber.className='viber-name';
  viber.textContent='Viber: '+person.viber;
  const phone=document.createElement('div');
  phone.className='phone';
  phone.textContent=person.phone||'';
  info.appendChild(nameEn);
  info.appendChild(nameUa);
  info.appendChild(viber);
  info.appendChild(phone);

  const rightCol=document.createElement('div');
  rightCol.className='right-col';

  const btn17=document.createElement('div');
  btn17.className='check-btn'+(listType==='17'?' checked-17':'');
  btn17.innerHTML='<svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg><span class="btn-label">17:00</span>';
  btn17.addEventListener('click',(e)=>{
    e.stopPropagation();
    btn17.classList.toggle('checked-17');
    div.classList.add('card-removing');
    const savedScroll=window.scrollY;
    setTimeout(()=>toggleList(person.en,'17',savedScroll),360);
  });

  const btn19=document.createElement('div');
  btn19.className='check-btn'+(listType==='19'?' checked-19':'');
  btn19.innerHTML='<svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg><span class="btn-label">19:00</span>';
  btn19.addEventListener('click',(e)=>{
    e.stopPropagation();
    btn19.classList.toggle('checked-19');
    div.classList.add('card-removing');
    const savedScroll=window.scrollY;
    setTimeout(()=>toggleList(person.en,'19',savedScroll),360);
  });

  rightCol.appendChild(btn17);
  rightCol.appendChild(btn19);
  div.appendChild(avatarWrap);
  div.appendChild(info);
  div.appendChild(rightCol);
  return div;
}

function render(query=''){
  const q=query.toLowerCase().trim();
  const peopleList=document.getElementById('people-list');
  const list17=document.getElementById('list-17');
  const list19=document.getElementById('list-19');
  const noResults=document.getElementById('no-results');
  const section17=document.getElementById('section-17');
  const section19=document.getElementById('section-19');

  peopleList.innerHTML='';
  list17.innerHTML='';
  list19.innerHTML='';

  const inAnyList=n=>set17.includes(n)||set19.includes(n);
  const mainPeople=PEOPLE.filter(p=>!inAnyList(p.en));
  const people17=set17.map(n=>PEOPLE.find(p=>p.en===n)).filter(Boolean);
  const people19=set19.map(n=>PEOPLE.find(p=>p.en===n)).filter(Boolean);
  const match=p=>!q||p.en.toLowerCase().includes(q)||p.ua.toLowerCase().includes(q);

  const filtered=mainPeople.filter(match);
  const filtered17=people17.filter(match);
  const filtered19=people19.filter(match);

  filtered.forEach(p=>peopleList.appendChild(createCard(p,'main')));
  document.getElementById('count').textContent=filtered.length;
  noResults.style.display=filtered.length===0&&mainPeople.length>0?'block':'none';
  document.getElementById('count-17-top').textContent=people17.length;
  document.getElementById('count-19-top').textContent=people19.length;

  if(people17.length>0){
    section17.style.display='block';
    document.getElementById('count-17').textContent=filtered17.length;
    filtered17.forEach(p=>list17.appendChild(createCard(p,'17')));
  }else{section17.style.display='none';}

  if(people19.length>0){
    section19.style.display='block';
    document.getElementById('count-19').textContent=filtered19.length;
    filtered19.forEach(p=>list19.appendChild(createCard(p,'19')));
  }else{section19.style.display='none';}
}

function toggleList(name,listType,savedScroll){
  const was17=set17.includes(name);
  const was19=set19.includes(name);
  set17=set17.filter(n=>n!==name);
  set19=set19.filter(n=>n!==name);
  const wasInTarget=(listType==='17'&&was17)||(listType==='19'&&was19);
  if(!wasInTarget){
    if(listType==='17')set17.push(name);
    else if(listType==='19')set19.push(name);
  }
  render(document.getElementById('search').value);
  if(wasInTarget&&savedScroll!==undefined){
    requestAnimationFrame(()=>window.scrollTo({top:savedScroll,behavior:'instant'}));
  }
  syncToFirebase();
}

async function syncToFirebase(){
  setSyncStatus('syncing');
  try{
    const payload=JSON.stringify({set17,set19,ts:Date.now()});
    const r=await fetch(DB_URL+'/gigroup.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:payload});
    if(r.ok){setSyncStatus('synced');setTimeout(()=>setSyncStatus(''),3000);}
    else setSyncStatus('error');
  }catch(e){setSyncStatus('error');}
}

async function loadFromFirebase(){
  setSyncStatus('syncing');
  try{
    const r=await fetch(DB_URL+'/gigroup.json');
    if(r.ok){
      const data=await r.json();
      if(data&&Array.isArray(data.set17)&&Array.isArray(data.set19)){
        set17=data.set17;
        set19=data.set19;
        fbLoaded=true;
        render(document.getElementById('search').value);
        setSyncStatus('synced');
        setTimeout(()=>setSyncStatus(''),3000);
      }else{setSyncStatus('synced');}
    }else setSyncStatus('error');
  }catch(e){setSyncStatus('error');}
}

function saveData(){
  syncToFirebase();
  const toast=document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

document.getElementById('btn-save').addEventListener('click',saveData);
document.getElementById('search').addEventListener('input',e=>render(e.target.value));

render();
loadFromFirebase();
</script>
