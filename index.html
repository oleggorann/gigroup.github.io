<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00c896;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --header-h: 56px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    z-index: 100;
  }

  .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 15px; color: var(--accent); }

  .search-wrap { flex: 1; position: relative; }
  #search {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 7px 10px 7px 30px; outline: none;
  }

  .header-counts { display: flex; flex-direction: column; align-items: flex-end; font-size: 10px; }
  .hc-item { color: var(--text-muted); }
  .btn-save {
    background: var(--accent); color: #000; border: none; border-radius: 6px;
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 600;
    padding: 8px 12px; cursor: pointer;
  }

  main { padding-top: calc(var(--header-h) + 10px); padding-bottom: 40px; }

  .section-label {
    font-family: 'Unbounded', sans-serif; font-size: 9px; text-transform: uppercase;
    color: var(--text-muted); padding: 15px 12px 5px; border-bottom: 1px solid var(--border);
  }

  .person {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .person.item-17 { background: #1a1408; }
  .person.item-19 { background: #120e1a; }

  .avatar { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #222; }

  .info { flex: 1; min-width: 0; }
  .name-en { font-weight: 600; font-size: 14px; }
  .name-ua { font-size: 12px; color: var(--text-dim); }
  .phone { color: var(--accent); font-size: 12px; margin-top: 3px; }

  .controls { display: flex; flex-direction: column; gap: 8px; }
  .check-btn {
    width: 32px; height: 24px; border-radius: 4px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 8px; cursor: pointer;
  }
  .check-btn.active-17 { background: #f59e0b; border-color: #f59e0b; color: #000; }
  .check-btn.active-19 { background: #8b5cf6; border-color: #8b5cf6; color: #000; }

  .saved-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px;
    transition: transform 0.3s; z-index: 1000;
  }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
</style>

  </div>
  <div class="header-counts">
    <span class="hc-item">Всього: <span id="count-all">0</span></span>
    <span class="hc-item" style="color:#f59e0b">17:00: <span id="count-17-top">0</span></span>
    <span class="hc-item" style="color:#8b5cf6">19:00: <span id="count-19-top">0</span></span>
  </div>
  <button class="btn-save" id="save-btn">Save</button>
</header>

<main>

    <div class="section-label" style="color:#f59e0b">Список 17:00</div>
    <div id="list-17"></div>
  </div>

  <div id="section-19" style="display:none">

let selected17 = [];
let selected19 = [];

function loadData() {
  db.ref('attendance').on('value', (snap) => {
    const data = snap.val() || {};
    selected17 = data.set17 || [];
    selected19 = data.set19 || [];
    render();
  });
}

function saveData() {
  db.ref('attendance').set({
    set17: selected17,
    set19: selected19
  }).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

function toggle(name, list) {
  if (list === '17') {
    if (selected17.includes(name)) {
      selected17 = selected17.filter(n => n !== name);
    } else {
      selected17.push(name);
      selected19 = selected19.filter(n => n !== name);
    }
  } else {
    if (selected19.includes(name)) {
      selected19 = selected19.filter(n => n !== name);
    } else {
      selected19.push(name);
      selected17 = selected17.filter(n => n !== name);
    }
  }
  render(document.getElementById('search').value);
}

function createCard(p, mode) {
  const is17 = selected17.includes(p.en);
  const is19 = selected19.includes(p.en);
  
  const div = document.createElement('div');
  div.className = 'person' + (is17 ? ' item-17' : is19 ? ' item-19' : '');
  div.innerHTML = `
    <img class="avatar" src="${p.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${p.en}&background=222&color=00c896'">
    <div class="info">
      <div class="name-en">${p.en}</div>
      <div class="name-ua">${p.ua}</div>
      <div class="phone">${p.phone}</div>
    </div>
    <div class="controls">
      <div class="check-btn ${is17 ? 'active-17' : ''}" onclick="toggle('${p.en}', '17')">17:00</div>
      <div class="check-btn ${is19 ? 'active-19' : ''}" onclick="toggle('${p.en}', '19')">19:00</div>
    </div>
  `;
  return div;
}

function render(query = '') {
  const q = query.toLowerCase().trim();
  const listMain = document.getElementById('list-main');
  const list17 = document.getElementById('list-17');
  const list19 = document.getElementById('list-19');

  listMain.innerHTML = ''; list17.innerHTML = ''; list19.innerHTML = '';

  const filtered = PEOPLE.filter(p => p.en.toLowerCase().includes(q) || p.ua.toLowerCase().includes(q));

  const mainArr = filtered.filter(p => !selected17.includes(p.en) && !selected19.includes(p.en));
  const arr17 = filtered.filter(p => selected17.includes(p.en));
  const arr19 = filtered.filter(p => selected19.includes(p.en));

  mainArr.forEach(p => listMain.appendChild(createCard(p, 'main')));
  arr17.forEach(p => list17.appendChild(createCard(p, '17')));
  arr19.forEach(p => list19.appendChild(createCard(p, '19')));

  document.getElementById('count-all').textContent = mainArr.length;
  document.getElementById('count-17-top').textContent = selected17.length;
  document.getElementById('count-19-top').textContent = selected19.length;

  document.getElementById('section-17').style.display = arr17.length ? 'block' : 'none';
  document.getElementById('section-19').style.display = arr19.length ? 'block' : 'none';
}

document.getElementById('search').oninput = (e) => render(e.target.value);
document.getElementById('save-btn').onclick = saveData;

loadData();
