  /* Збережено всі ваші стилі */
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
    --accent: #00c896; --text: #e8e8e8; --text-dim: #888; --text-muted: #555;
    --header-h: 56px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow-x: hidden; }
  header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 12px; z-index: 100; }
  .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 14px; color: var(--accent); }
  .search-wrap { flex: 1; position: relative; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; outline: none; }
  .btn-save { background: var(--accent); color: #000; border: none; border-radius: 6px; font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 600; padding: 8px 10px; cursor: pointer; }
  main { padding-top: calc(var(--header-h) + 10px); padding-bottom: 30px; }
  .section-label { font-family: 'Unbounded', sans-serif; font-size: 9px; color: var(--text-muted); padding: 15px 12px 5px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .person { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .avatar { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); }
  .info { flex: 1; min-width: 0; }
  .name-en { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .name-ua { font-size: 11px; color: var(--text-dim); }
  .phone { font-size: 12px; color: var(--accent); margin-top: 2px; }
  .controls { display: flex; flex-direction: column; gap: 14px; }
  .check-btn { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
  .check-btn.checked-17 { background: #f59e0b; border-color: #f59e0b; }
  .check-btn.checked-19 { background: #8b5cf6; border-color: #8b5cf6; }
  .check-btn svg { width: 14px; height: 14px; stroke: #000; stroke-width: 3; fill: none; }
  .btn-label { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); font-size: 7px; color: var(--text-muted); }
  .saved-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px; transition: 0.4s; z-index: 200; font-weight: 600; }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
</style>

  let set17 = [];
  let set19 = [];

  // РЕНДЕР
  function render() {
    const query = document.getElementById('search').value.toLowerCase();
    const mainList = document.getElementById('people-list');
    const list17 = document.getElementById('list-17');
    const list19 = document.getElementById('list-19');

    mainList.innerHTML = ''; list17.innerHTML = ''; list19.innerHTML = '';

    PEOPLE.forEach(p => {
      if (query && !p.en.toLowerCase().includes(query) && !p.ua.toLowerCase().includes(query)) return;

      const card = document.createElement('div');
      card.className = 'person';
      card.innerHTML = `
        <img class="avatar" src="${p.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${p.en}'">
        <div class="info">
          <div class="name-en">${p.en}</div>
          <div class="name-ua">${p.ua}</div>
          <div class="phone">${p.phone}</div>
        </div>
        <div class="controls">
          <div class="check-btn ${set17.includes(p.en) ? 'checked-17' : ''}" data-name="${p.en}" data-type="17">
            <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
            <span class="btn-label">17:00</span>
          </div>
          <div class="check-btn ${set19.includes(p.en) ? 'checked-19' : ''}" data-name="${p.en}" data-type="19">
            <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
            <span class="btn-label">19:00</span>
          </div>
        </div>
      `;
      
      if (set17.includes(p.en)) list17.appendChild(card);
      else if (set19.includes(p.en)) list19.appendChild(card);
      else mainList.appendChild(card);
    });

    document.getElementById('section-17').style.display = set17.length ? 'block' : 'none';
    document.getElementById('section-19').style.display = set19.length ? 'block' : 'none';
    
    // Додаємо кліки після рендеру
    document.querySelectorAll('.check-btn').forEach(btn => {
      btn.onclick = () => toggle(btn.dataset.name, btn.dataset.type);
    });
  }

  // ТУТ ВІДБУВАЄТЬСЯ МАГІЯ КЛІКУ
  async function toggle(name, type) {
    if (type === '17') {
      if (set17.includes(name)) set17 = set17.filter(n => n !== name);
      else { set17.push(name); set19 = set19.filter(n => n !== name); }
    } else {
      if (set19.includes(name)) set19 = set19.filter(n => n !== name);
      else { set19.push(name); set17 = set17.filter(n => n !== name); }
    }
    render();
    await set(dataRef, { set17, set19 }); // Збереження в хмару
    showToast();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // СЛУХАЄМО ХМАРУ
  onValue(dataRef, (s) => {
    const d = s.val();
    if (d) {
      set17 = d.set17 || [];
      set19 = d.set19 || [];
      render();
    }
    document.getElementById('save-btn').textContent = "ONLINE";
  });

  document.getElementById('search').oninput = render;
  render(); // Початковий рендер
</script>
