<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gi Group</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00c896;
    --accent-dim: rgba(0,200,150,0.12);
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --present-bg: #0a1a15;
    --present-border: #00c89640;
    --header-h: 56px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    -webkit-tap-highlight-color: transparent;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    z-index: 100;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 7px 10px 7px 30px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 9px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 12px;
  }

  .header-counts {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
    line-height: 1.35;
  }

  .hc-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .hc-item::before {
    font-size: 9px;
    margin-right: 2px;
  }

  .hc-item:nth-child(1)::before { content: "Список"; color: var(--text-muted); }
  .hc-item:nth-child(2)::before { content: "17:00"; }
  .hc-item:nth-child(3)::before { content: "19:00"; }

  .hc-present { color: var(--accent); }

  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    padding: 8px 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity .2s;
  }
  .btn-save:active { opacity: .7; }

  /* MAIN */
  main {
    padding-top: calc(var(--header-h) + 8px);
    padding-bottom: 24px;
  }

  .section-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 14px 12px 6px;
    border-bottom: 1px solid var(--border);
  }

  .hc-item:nth-child(1) { color: var(--text-muted); }
  .hc-item:nth-child(1) span { color: var(--accent); }

  /* PERSON CARD */
  .person {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    transition: background .15s;
    position: relative;
  }

  .person.item-17 { background: #1a1200; border-bottom-color: #f59e0b30; }
  .person.item-19 { background: #110d1a; border-bottom-color: #8b5cf630; }

  /* AVATAR */
  .avatar {
    width: 52px; height: 52px;
    border-radius: 7px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: block;
    cursor: zoom-in;
  }

  .avatar-placeholder {
    width: 52px; height: 52px;
    border-radius: 7px;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif;
    font-size: 16px; font-weight: 600; color: var(--accent);
  }

  /* INFO */
  .info { flex: 1; min-width: 0; line-height: 1.3; }
  .name-en { font-weight: 600; font-size: 14px; color: var(--text); cursor: pointer; }
  .name-ua { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .viber-name { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .phone { font-size: 13px; color: var(--accent); margin-top: 2px; font-weight: 600; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.93);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    padding: 20px; cursor: zoom-out; opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  .lightbox.active { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 100%; max-height: 88vh; border-radius: 10px; transform: scale(0.88); transition: transform .28s; }
  .lightbox.active img { transform: scale(1); }

  /* CHECKBOX */
  .check-btn {
    width: 24px; height: 24px; border-radius: 5px; border: 1.5px solid var(--border);
    background: var(--surface2); cursor: pointer; display: flex; align-items: center;
    justify-content: center; position: relative;
  }
  .check-btn.checked-17 { background: #f59e0b; border-color: #f59e0b; }
  .check-btn.checked-19 { background: #8b5cf6; border-color: #8b5cf6; }
  .check-btn svg { width: 12px; height: 12px; stroke: #000; stroke-width: 2.5; fill: none; opacity: 0; }
  .check-btn.checked-17 svg, .check-btn.checked-19 svg { opacity: 1; }
  .check-btn .btn-label { position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); font-size: 7px; color: var(--text-muted); white-space: nowrap; }

  /* UI TOASTS */
  .saved-toast, .copy-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    padding: 9px 18px; border-radius: 8px; transition: transform .3s; z-index: 300;
  }
  .saved-toast { background: var(--accent); color: #000; font-weight: 600; }
  .copy-toast { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .show { transform: translateX(-50%) translateY(0); }

  .card-removing { animation: cardOut .38s forwards; pointer-events: none; }
  @keyframes cardOut {
    0% { opacity: 1; transform: translateX(0); }
    100% { opacity: 0; transform: translateX(40px); }
  }
</style>

let set17 = [];
let set19 = [];

// ЗАВАНТАЖЕННЯ З FIREBASE
function loadData() {
  db.ref('attendance').once('value').then((snapshot) => {
    const data = snapshot.val();
    if (data) {
      set17 = data.set17 || [];
      set19 = data.set19 || [];
      render();
    }
  });
}

// ЗБЕРЕЖЕННЯ В FIREBASE
function saveData() {
  db.ref('attendance').set({
    set17: set17,
    set19: set19
  }).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

function getInitials(name) {
  const parts = name.trim().split(' ');
  return (parts[0]?.[0] || '') + (parts[1]?.[0] || '');
}
