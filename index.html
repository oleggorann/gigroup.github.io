<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gi Group</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00c896;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --header-h: 56px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    z-index: 100;
  }

  .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 15px; color: var(--accent); }

  .search-wrap { flex: 1; position: relative; }
  #search {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 7px 10px 7px 30px; outline: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  .header-counts { display: flex; flex-direction: column; align-items: flex-end; font-size: 10px; line-height: 1.2; }
  .hc-item { color: var(--text-muted); white-space: nowrap; }

  .btn-save {
    background: var(--accent); color: #000; border: none; border-radius: 6px;
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 600;
    padding: 8px 12px; cursor: pointer;
  }

  main { padding-top: calc(var(--header-h) + 10px); padding-bottom: 40px; }

  .section-label {
    font-family: 'Unbounded', sans-serif; font-size: 9px; text-transform: uppercase;
    color: var(--text-muted); padding: 15px 12px 5px; border-bottom: 1px solid var(--border);
  }

  .person {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .person.item-17 { background: #1a1200; border-bottom-color: #f59e0b30; }
  .person.item-19 { background: #110d1a; border-bottom-color: #8b5cf630; }

  .avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .avatar { width: 52px; height: 52px; border-radius: 7px; object-fit: cover; background: #222; border: 1px solid var(--border); }
  .avatar-placeholder { width: 52px; height: 52px; border-radius: 7px; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 600; }
  .flag-below { font-size: 12px; }

  .info { flex: 1; min-width: 0; }
  .name-en { font-weight: 600; font-size: 14px; cursor: pointer; }
  .name-ua { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .phone { color: var(--accent); font-size: 13px; margin-top: 3px; font-weight: 600; }
  .viber-name { font-size: 11px; color: var(--text-muted); }

  .right-col { display: flex; flex-direction: column; align-items: center; gap: 15px; }
  .check-btn {
    width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--border);
    background: var(--surface2); position: relative; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .check-btn svg { width: 14px; height: 14px; stroke: #000; stroke-width: 3; fill: none; display: none; }
  .check-btn.active svg { display: block; }
  
  .check-btn.checked-17 { background: #f59e0b; border-color: #f59e0b; }
  .check-btn.checked-19 { background: #8b5cf6; border-color: #8b5cf6; }

  .btn-label { position: absolute; bottom: -10px; font-size: 7px; color: var(--text-muted); white-space: nowrap; }

  .saved-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px;
    transition: transform 0.3s; z-index: 1000; font-family: 'Unbounded', sans-serif; font-size: 10px;
  }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <span class="logo">Gi Group</span>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search" placeholder="Пошук..." autocomplete="off">
  </div>
  <div class="header-counts">
    <span class="hc-item">Всього: <span id="count-all">0</span></span>
    <span class="hc-item" style="color:#f59e0b">17:00: <span id="count-17-top">0</span></span>
    <span class="hc-item" style="color:#8b5cf6">19:00: <span id="count-19-top">0</span></span>
  </div>
  <button class="btn-save" onclick="saveData()">Save</button>
</header>

<main>
  <div id="section-main">
    <div class="section-label">Доступні</div>
    <div id="people-list"></div>
  </div>

  <div id="section-17">
    <div class="section-label" style="color:#f59e0b">Список 17:00 · <span id="count-17">0</span></div>
    <div id="list-17"></div>
  </div>

  <div id="section-19">
    <div class="section-label" style="color:#8b5cf6">Список 19:00 · <span id="count-19">0</span></div>
    <div id="list-19"></div>
  </div>
  <div id="no-results" style="text-align:center; padding: 20px; color: var(--text-muted); display:none">Нікого не знайдено</div>
</main>

<div class="saved-toast" id="toast">✓ Збережено локально</div>

<script>
// ТУТ ТВІЙ МАСИВ PEOPLE (я залишаю місце, щоб ти просто вставив його сюди без змін)
const PEOPLE = [
  {
    en:    "Adashynskyi Kostiantyn",
    ua:    "Адашинський Костянтин",
    viber: "Адашинський Костя",
    phone: "+380 96 751 7530",
    photo: "photos/adashynskyi_kostiantyn.jpg",
    flag:  "🇺🇦",
  },
  {
    en:    "Anosov Oleksandr",
    ua:    "Аносов Олександр",
    viber: "Anosov Oleksandr",
    phone: "+380 99 331 7814",
    photo: "photos/anosov_oleksandr.jpg",
    flag:  "🇺🇦",
  },
  {
    en:    "Bokoch Mykhailo",
    ua:    "Бокоч Михайло",
    viber: "Bokoch Misha",
    phone: "+380 68 229 2395",
    photo: "photos/bokoch_mykhailo.jpg",
    flag:  "🇺🇦",
  },
  // ... ВСТАВ РЕШТУ СВОЇХ ЛЮДЕЙ СЮДИ БЕЗ ЗМІН ...
  {
    en:    "Zieniewicz Arkadiusz Sebastian",
    ua:    "Зєнєвіч Аркадіуш Себастіан",
    viber: "Name",
    phone: "+380 00 000 00",
    photo: "photos/zieniewicz_arkadiusz.jpg",
    flag:  "🇵🇱",
  }
];

let set17 = [];
let set19 = [];

function loadData() {
  const s17 = localStorage.getItem('gi_group_17');
  const s19 = localStorage.getItem('gi_group_19');
  if (s17) set17 = JSON.parse(s17);
  if (s19) set19 = JSON.parse(s19);
  render();
}

function saveData() {
  localStorage.setItem('gi_group_17', JSON.stringify(set17));
  localStorage.setItem('gi_group_19', JSON.stringify(set19));
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function toggleList(name, type) {
  if (type === '17') {
    if (set17.includes(name)) {
      set17 = set17.filter(n => n !== name);
    } else {
      set17.push(name);
      set19 = set19.filter(n => n !== name);
    }
  } else {
    if (set19.includes(name)) {
      set19 = set19.filter(n => n !== name);
    } else {
      set19.push(name);
      set17 = set17.filter(n => n !== name);
    }
  }
  render(document.getElementById('search').value);
}

function createCard(p, listType) {
  const is17 = set17.includes(p.en);
  const is19 = set19.includes(p.en);
  
  const div = document.createElement('div');
  div.className = 'person' + (listType === '17' ? ' item-17' : listType === '19' ? ' item-19' : '');
  
  const initials = p.en.split(' ').map(n => n[0]).join('');

  div.innerHTML = `
    <div class="avatar-wrap">
      <img class="avatar" src="${p.photo}" onerror="this.outerHTML='<div class=\'avatar-placeholder\'>${initials}</div>'">
      <div class="flag-below">${p.flag || ''}</div>
    </div>
    <div class="info">
      <div class="name-en">${p.en}</div>
      <div class="name-ua">${p.ua}</div>
      <div class="viber-name">Viber: ${p.viber}</div>
      <div class="phone">${p.phone}</div>
    </div>
    <div class="right-col">
      <div class="check-btn ${is17 ? 'checked-17 active' : ''}" onclick="toggleList('${p.en}', '17')">
        <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
        <span class="btn-label">17:00</span>
      </div>
      <div class="check-btn ${is19 ? 'checked-19 active' : ''}" onclick="toggleList('${p.en}', '19')">
        <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
        <span class="btn-label">19:00</span>
      </div>
    </div>
  `;
  return div;
}

function render(query = '') {
  const q = query.toLowerCase().trim();
  const listMain = document.getElementById('people-list');
  const list17 = document.getElementById('list-17');
  const list19 = document.getElementById('list-19');
  
  listMain.innerHTML = ''; list17.innerHTML = ''; list19.innerHTML = '';

  const filtered = PEOPLE.filter(p => 
    p.en.toLowerCase().includes(q) || 
    p.ua.toLowerCase().includes(q)
  );

  const mainArr = filtered.filter(p => !set17.includes(p.en) && !set19.includes(p.en));
  const arr17 = filtered.filter(p => set17.includes(p.en));
  const arr19 = filtered.filter(p => set19.includes(p.en));

  mainArr.forEach(p => listMain.appendChild(createCard(p, 'main')));
  arr17.forEach(p => list17.appendChild(createCard(p, '17')));
  arr19.forEach(p => list19.appendChild(createCard(p, '19')));

  // Оновлення лічильників
  document.getElementById('count-all').textContent = mainArr.length;
  document.getElementById('count-17-top').textContent = set17.length;
  document.getElementById('count-19-top').textContent = set19.length;
  document.getElementById('count-17').textContent = arr17.length;
  document.getElementById('count-19').textContent = arr19.length;

  // Показ/приховання секцій
  document.getElementById('section-17').style.display = set17.length ? 'block' : 'none';
  document.getElementById('section-19').style.display = set19.length ? 'block' : 'none';
  document.getElementById('no-results').style.display = (filtered.length === 0) ? 'block' : 'none';
}

document.getElementById('search').oninput = (e) => render(e.target.value);

loadData();
</script>
</body>
</html>
