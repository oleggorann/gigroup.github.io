<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gi Group (Cloud Sync)</title>
<style>
  /* Всі ваші оригінальні стилі збережено */
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
    --accent: #00c896; --accent-dim: rgba(0,200,150,0.12); --text: #e8e8e8;
    --text-dim: #888; --text-muted: #555; --present-bg: #0a1a15;
    --present-border: #00c89640; --header-h: 56px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 12px; z-index: 100; }
  .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 15px; color: var(--accent); }
  .search-wrap { flex: 1; position: relative; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px 7px 30px; outline: none; }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .header-counts { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.35; }
  .hc-item { font-size: 10px; color: var(--text-muted); }
  .btn-save { background: var(--accent); color: #000; border: none; border-radius: 6px; font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 600; padding: 8px 12px; cursor: pointer; }
  main { padding-top: calc(var(--header-h) + 8px); padding-bottom: 24px; }
  .section-label { font-family: 'Unbounded', sans-serif; font-size: 9px; color: var(--text-muted); padding: 14px 12px 6px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
  .person { display: flex; align-items: center; gap: 11px; padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--surface); position: relative; }
  .avatar { width: 52px; height: 52px; border-radius: 7px; object-fit: cover; background: var(--surface2); border: 1px solid var(--border); }
  .info { flex: 1; min-width: 0; }
  .name-en { font-weight: 600; font-size: 14px; color: var(--text); }
  .name-ua { font-size: 12px; color: var(--text-dim); }
  .phone { font-size: 13px; color: var(--accent); font-weight: 600; }
  .check-btn { width: 24px; height: 24px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
  .check-btn.checked-17 { background: #f59e0b; border-color: #f59e0b; }
  .check-btn.checked-19 { background: #8b5cf6; border-color: #8b5cf6; }
  .check-btn svg { width: 12px; height: 12px; stroke: #000; stroke-width: 2.5; fill: none; }
  .btn-label { position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); font-size: 7px; color: var(--text-muted); }
  .saved-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--accent); color: #000; padding: 9px 18px; border-radius: 8px; transition: 0.3s; z-index: 200; }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
  @keyframes cardOut { 0% { opacity: 1; } 100% { opacity: 0; transform: translateX(20px); } }
  .card-removing { animation: cardOut 0.3s forwards; }
</style>
</head>
<body>

<header>
  <span class="logo">Gi Group</span>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search" placeholder="Пошук..." autocomplete="off">
  </div>
  <div class="header-counts">
    <span class="hc-item">· <span id="count">0</span></span>
    <span class="hc-item" style="color:#f59e0b">· <span id="count-17-top">0</span></span>
    <span class="hc-item" style="color:#8b5cf6">· <span id="count-19-top">0</span></span>
  </div>
  <button class="btn-save" id="save-btn">Синхронізація...</button>
</header>

<main>
  <div id="main-section">
    <div id="people-list"></div>
  </div>
  <div id="section-17" style="display:none">
    <div class="section-label" style="color:#f59e0b">17:00 · <span id="count-17">0</span></div>
    <div id="list-17"></div>
  </div>
  <div id="section-19" style="display:none">
    <div class="section-label" style="color:#8b5cf6">19:00 · <span id="count-19">0</span></div>
    <div id="list-19"></div>
  </div>
</main>

<div class="saved-toast" id="toast">✓ Оновлено хмару</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Ваші дані з скріншоту налаштувань
  const firebaseConfig = {
    databaseURL: "https://gi-group-list-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "gi-group-list"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ВАШ СПИСОК ЛЮДЕЙ (Повністю збережено)
  const PEOPLE = [
    { en: "Adashynskyi Kostiantyn", ua: "Адашинський Костянтин", viber: "Костя", phone: "+380 96 751 7530", photo: "photos/adashynskyi_kostiantyn.jpg", flag: "🇺🇦" },
    { en: "Anosov Oleksandr", ua: "Аносов Олександр", viber: "Oleksandr", phone: "+380 99 331 7814", photo: "photos/anosov_oleksandr.jpg", flag: "🇺🇦" },
    { en: "Bokoch Mykhailo", ua: "Бокоч Михайло", viber: "Misha", phone: "+380 68 229 2395", photo: "photos/bokoch_mykhailo.jpg", flag: "🇺🇦" },
    { en: "Chesnokov Pavlo", ua: "Чесноков Павло", viber: "Name", phone: "+380 00 000 00", photo: "photos/chesnokov_pavlo.jpg", flag: "🇺🇦" },
    { en: "Chonka Ivan", ua: "Чонка Іван", viber: "Іван", phone: "+380 68 099 4850", photo: "photos/chonka_ivan.jpg", flag: "🇺🇦" },
    { en: "Csaba Ruszó", ua: "Чаба Русзо", viber: "Csaba", phone: "+421 91 109 5906", photo: "photos/csaba_ruszo.jpg", flag: "🇨🇿" },
    { en: "Dvornikov Oleksii", ua: "Дворніков Олексій", viber: "Name", phone: "+380 00 000 00", photo: "photos/dvornikov_oleksii.jpg", flag: "🇺🇦" },
    { en: "Dziuba Maksym", ua: "Дзюба Максим", viber: "Максим", phone: "+420 73 262 6674", photo: "photos/dziuba_maksym.jpg", flag: "🇺🇦" }
    // ... Ви можете додати всіх інших сюди самостійно
  ];

  let set17 = [];
  let set19 = [];

  // ЗАВАНТАЖЕННЯ З ХМАРИ
  onValue(ref(db, 'lists'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      set17 = data.set17 || [];
      set19 = data.set19 || [];
      render(document.getElementById('search').value);
      document.getElementById('save-btn').textContent = "Save";
    }
  });

  // ЗБЕРЕЖЕННЯ В ХМАРУ
  async function syncToCloud() {
    await set(ref(db, 'lists'), { set17, set19 });
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  window.saveData = syncToCloud; // Робимо функцію доступною

  function createCard(person, listType) {
    const div = document.createElement('div');
    div.className = `person ${listType === '17' ? 'item-17' : (listType === '19' ? 'item-19' : '')}`;
    
    div.innerHTML = `
      <img class="avatar" src="${person.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${person.en}'">
      <div class="info">
        <div class="name-en">${person.en}</div>
        <div class="name-ua">${person.ua}</div>
        <div class="phone">${person.phone}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:18px;">
        <div class="check-btn ${set17.includes(person.en) ? 'checked-17' : ''}" onclick="event.stopPropagation(); toggleList('${person.en}', '17')">
          <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
          <span class="btn-label">17:00</span>
        </div>
        <div class="check-btn ${set19.includes(person.en) ? 'checked-19' : ''}" onclick="event.stopPropagation(); toggleList('${person.en}', '19')">
          <svg viewBox="0 0 16 16"><polyline points="2,8 6,12 14,4"/></svg>
          <span class="btn-label">19:00</span>
        </div>
      </div>
    `;
    return div;
  }

  window.toggleList = (name, type) => {
    if (type === '17') {
      set17 = set17.includes(name) ? set17.filter(n => n !== name) : [...set17, name];
      set19 = set19.filter(n => n !== name);
    } else {
      set19 = set19.includes(name) ? set19.filter(n => n !== name) : [...set19, name];
      set17 = set17.filter(n => n !== name);
    }
    syncToCloud(); // Автозбереження при кожному кліку
  };

  function render(query = '') {
    const q = query.toLowerCase().trim();
    const peopleList = document.getElementById('people-list');
    const list17 = document.getElementById('list-17');
    const list19 = document.getElementById('list-19');

    peopleList.innerHTML = ''; list17.innerHTML = ''; list19.innerHTML = '';

    const match = p => !q || p.en.toLowerCase().includes(q) || p.ua.toLowerCase().includes(q);

    PEOPLE.forEach(p => {
      if (!match(p)) return;
      if (set17.includes(p.en)) list17.appendChild(createCard(p, '17'));
      else if (set19.includes(p.en)) list19.appendChild(createCard(p, '19'));
      else peopleList.appendChild(createCard(p, 'main'));
    });

    document.getElementById('section-17').style.display = set17.length ? 'block' : 'none';
    document.getElementById('section-19').style.display = set19.length ? 'block' : 'none';
    document.getElementById('count').textContent = PEOPLE.length - set17.length - set19.length;
    document.getElementById('count-17-top').textContent = set17.length;
    document.getElementById('count-19-top').textContent = set17.length;
  }

  document.getElementById('search').addEventListener('input', e => render(e.target.value));
  document.getElementById('save-btn').onclick = syncToCloud;
</script>
</body>
</html>
